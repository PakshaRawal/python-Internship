{% extends 'base.html' %}

{% block title %}Login | Stock Management System{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="w-full max-w-md bg-white shadow-md rounded-2xl p-8">
        
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-emerald-600">Login</h2>
            <p class="text-gray-500 mt-2">
                Sign in to manage your stock system
            </p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 px-4 py-3 rounded-lg bg-red-100 text-red-700 border border-red-200">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Username
                </label>
                <input 
                    type="text" 
                    name="username"
                    placeholder="Enter your username"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
                    required
                >
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Password
                </label>
                <input 
                    type="password" 
                    name="password"
                    placeholder="Enter your password"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
                    required
                >
            </div>

            <button 
                type="submit"
                class="w-full bg-emerald-600 text-white py-3 rounded-lg font-medium hover:bg-emerald-700 transition"
            >
                Login
            </button>
        </form>
    </div>
</div>
{% endblock %}
